# App on /. /api → backend. Any /w… → 301 to https://$host/… (absolute URL; avoids bad relative Location behind TLS proxies).
# api.ancap.cloud → FastAPI only (Swagger /docs, /openapi.json, /v1/* must not hit Next.js).

map $http_upgrade $connection_upgrade {
    default upgrade;
    ""      "";
}

map $http_x_forwarded_proto $ancap_forwarded_proto {
    default $http_x_forwarded_proto;
    ""      $scheme;
}

map $uri $ancap_redir_no_w {
    ~*^/w/(.*)$ /$1;
    ~*^/w$ /;
    default "";
}

resolver 127.0.0.11 ipv6=off valid=10s;

# Public API host: all paths go to uvicorn (not the Next frontend).
server {
    listen 80;
    server_name api.ancap.cloud;

    location / {
        set $upstream_api api;
        proxy_pass http://$upstream_api:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $ancap_forwarded_proto;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }
}

# Main site: Next.js + /api/* → backend with /api prefix stripped.
server {
    listen 80 default_server;
    server_name ancap.cloud www.ancap.cloud;

    # Swagger at /api/docs loads openapi from same browser origin as absolute /openapi.json.
    location = /openapi.json {
        set $upstream_api api;
        proxy_pass http://$upstream_api:8000/openapi.json;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $ancap_forwarded_proto;
        proxy_read_timeout 300s;
    }

    location ^~ /api {
        set $upstream_api api;
        rewrite ^/api/?(.*)$ /$1 break;
        proxy_pass http://$upstream_api:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $ancap_forwarded_proto;
        proxy_read_timeout 300s;
    }

    # Force canonical URL without /w (absolute https — critical behind Cloudflare / tunnel on :80).
    location = /w {
        return 301 https://$host$ancap_redir_no_w$is_args$args;
    }

    location ^~ /w/ {
        return 301 https://$host$ancap_redir_no_w$is_args$args;
    }

    location ^~ /_next/ {
        set $upstream_frontend frontend;
        proxy_pass http://$upstream_frontend:3000$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $ancap_forwarded_proto;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
        proxy_hide_header Cache-Control;
        add_header Cache-Control "private, max-age=31536000, immutable" always;
        proxy_pass_header ETag;
    }

    location / {
        set $upstream_frontend frontend;
        proxy_pass http://$upstream_frontend:3000$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $ancap_forwarded_proto;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
        proxy_send_timeout 300s;

        proxy_hide_header Cache-Control;
        add_header Cache-Control "private, max-age=0, must-revalidate" always;
    }
}
